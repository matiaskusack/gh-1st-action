name: Lint, Test, and Deploy
on: push
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v3
        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install packages
          run: npm ci
        - name: Run tests
          run: npm test
    lint:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v3
        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Lint
          run: npm run lint
    deploy:
        runs-on: ubuntu-latest
        needs: [build, lint]
        steps:
        - name: Checkout
          uses: actions/checkout@v3
        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install packages
          run: npm ci
        - name: Build
          run: npm run build
        - name: Deploy
          run: echo "Deploying to production /dist folder..."

